<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard — Synthetica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0a12;
    --purple: #6C5CE7;
    --purple-soft: #8b7ff0;
    --cyan: #00D2D3;
    --text: #f2f1f8;
    --text-dim: #9a97b5;
    --border: rgba(255,255,255,0.08);
    --glass: rgba(255,255,255,0.04);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background: radial-gradient(ellipse 70% 40% at 20% 0%, rgba(108,92,231,0.18), transparent),
                radial-gradient(ellipse 50% 30% at 100% 20%, rgba(0,210,211,0.1), transparent),
                var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  .display{ font-family:'Space Grotesk', sans-serif; }

  nav{
    position: sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding: 16px 5vw;
    backdrop-filter: blur(16px);
    background: rgba(10,10,18,0.65);
    border-bottom: 1px solid var(--border);
  }
  .logo{ display:flex; align-items:center; gap:10px; font-weight:700; font-size:1.1rem; text-decoration:none; color:var(--text); }
  .logo-mark{
    width:26px;height:26px;border-radius:8px;
    background: conic-gradient(from 180deg, var(--purple), var(--cyan), var(--purple));
    box-shadow: 0 0 16px rgba(108,92,231,0.6);
  }
  .conn-pill{
    display:flex; align-items:center; gap:8px; font-size:0.8rem; color:var(--text-dim);
    border:1px solid var(--border); padding:7px 14px; border-radius:100px; background: var(--glass);
  }
  .conn-dot{ width:7px;height:7px;border-radius:50%; background:#666; transition: background .3s; }
  .conn-dot.connected{ background: var(--cyan); box-shadow:0 0 8px var(--cyan); }

  main{ max-width: 1280px; margin: 0 auto; padding: 40px 5vw 80px; display:grid; grid-template-columns: 380px 1fr; gap:28px; align-items:start; }

  .panel{
    background: var(--glass); border:1px solid var(--border); border-radius:18px;
    backdrop-filter: blur(20px); padding: 26px;
  }

  .gen-panel h1{ font-family:'Space Grotesk'; font-size:1.4rem; margin-bottom:6px; font-weight:700; }
  .gen-panel .sub{ color: var(--text-dim); font-size:0.85rem; margin-bottom:22px; line-height:1.5; }

  label{ font-size:0.78rem; color: var(--text-dim); font-weight:600; text-transform:uppercase; letter-spacing:0.04em; display:block; margin-bottom:8px; }
  textarea{
    width:100%; background: rgba(255,255,255,0.05); border:1px solid var(--border);
    color: var(--text); padding: 13px 14px; border-radius: 12px; font-family:inherit; font-size:0.92rem;
    outline:none; resize: vertical; min-height: 88px; transition: border-color .2s; line-height:1.5;
  }
  textarea:focus{ border-color: var(--purple-soft); }
  textarea::placeholder{ color: #5e5b78; }

  .field{ margin-bottom: 18px; }

  .quick-chips{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .chip{
    background: rgba(255,255,255,0.04); border:1px solid var(--border); color: var(--text-dim);
    padding: 7px 14px; border-radius: 100px; font-size:0.78rem; cursor:pointer; font-family:inherit; font-weight:500;
    transition: all .15s;
  }
  .chip:hover{ background: rgba(108,92,231,0.15); border-color: var(--purple-soft); color: var(--text); }

  .btn{
    border:none; cursor:pointer; font-family:inherit; font-weight:600;
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    transition: transform .15s ease, box-shadow .2s ease, opacity .2s ease;
    width:100%; padding:13px; border-radius:11px; font-size:0.92rem;
  }
  .btn:active{ transform: scale(0.98); }
  .btn-primary{
    background: linear-gradient(135deg, var(--purple), #5849c4); color:#fff;
    box-shadow: 0 4px 24px rgba(108,92,231,0.4);
  }
  .btn-primary:hover{ box-shadow: 0 6px 30px rgba(108,92,231,0.6); }
  .btn-primary:disabled{ opacity:0.55; cursor:not-allowed; box-shadow:none; transform:none; }
  .btn-ghost{ background: var(--glass); border:1px solid var(--border); color:var(--text); margin-top:10px; }
  .btn-ghost:hover{ background: rgba(255,255,255,0.08); }

  .status-row{
    display:flex; align-items:center; gap:8px; font-size:0.82rem; color: var(--text-dim);
    margin-top:16px; padding-top:16px; border-top: 1px solid var(--border);
  }
  .status-led{ width:7px;height:7px;border-radius:50%; background:#666; }
  .status-led.generating{ background: var(--purple-soft); box-shadow:0 0 8px var(--purple-soft); animation: pulse 1s infinite; }
  .status-led.ready{ background:#28c840; box-shadow:0 0 8px #28c840; }
  .status-led.connected{ background: var(--cyan); box-shadow:0 0 8px var(--cyan); }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* current preview inside gen panel */
  .preview-box{
    margin-top: 18px; border-radius:14px; overflow:hidden; border:1px solid var(--border);
    aspect-ratio: 4/3; position:relative; background: rgba(255,255,255,0.03);
    display:flex; align-items:center; justify-content:center;
  }
  .preview-box img{ width:100%; height:100%; object-fit:cover; display:none; }
  .preview-empty{ color: var(--text-dim); font-size:0.8rem; text-align:center; padding:20px; }
  .loading-overlay{
    position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; gap:10px;
    background: rgba(10,10,18,0.6); backdrop-filter: blur(2px);
  }
  .loading-overlay.active{ display:flex; }
  .spinner{
    width:30px; height:30px; border-radius:50%;
    border: 3px solid rgba(255,255,255,0.15); border-top-color: var(--cyan);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  .loading-overlay span{ font-size:0.78rem; color: var(--text); }

  /* worlds gallery */
  .worlds-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .worlds-head h2{ font-family:'Space Grotesk'; font-size:1.3rem; font-weight:700; }
  .worlds-head .count{ font-size:0.82rem; color: var(--text-dim); }

  .worlds-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap:18px; }
  .world-card{
    background: var(--glass); border:1px solid var(--border); border-radius:16px; overflow:hidden;
    transition: transform .2s, border-color .2s; cursor:default;
  }
  .world-card:hover{ transform: translateY(-3px); border-color: rgba(108,92,231,0.35); }
  .world-thumb{ aspect-ratio: 4/3; width:100%; object-fit:cover; display:block; background: rgba(255,255,255,0.03); }
  .world-meta{ padding: 14px; }
  .world-prompt{ font-size:0.82rem; color: var(--text); line-height:1.4; margin-bottom:10px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .world-actions{ display:flex; gap:8px; }
  .world-actions button{
    flex:1; font-size:0.74rem; padding:7px; border-radius:8px; border:1px solid var(--border);
    background: rgba(255,255,255,0.03); color: var(--text-dim); cursor:pointer; font-family:inherit; font-weight:500;
    transition: all .15s;
  }
  .world-actions button:hover{ background: rgba(108,92,231,0.15); color: var(--text); border-color: var(--purple-soft); }

  .empty-state{
    grid-column: 1/-1; text-align:center; padding: 60px 20px; color: var(--text-dim);
    border: 1px dashed var(--border); border-radius:16px;
  }
  .empty-state svg{ opacity:0.4; margin-bottom:14px; }
  .empty-state p{ font-size:0.9rem; }

  @media (max-width: 880px){
    main{ grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo"><div class="logo-mark"></div> Synthetica</a>
  <div class="conn-pill"><div class="conn-dot" id="connDot"></div><span id="connText">Connecting…</span></div>
</nav>

<main>
  <!-- Generator panel -->
  <div class="panel gen-panel">
    <h1>Generate a world</h1>
    <p class="sub">Describe a place, and Synthetica will render it live.</p>

    <div class="field">
      <label for="promptInput">Prompt</label>
      <textarea id="promptInput" placeholder="A floating crystal city above the clouds, golden hour light…"></textarea>
      <div class="quick-chips">
        <button class="chip" onclick="setPrompt('A misty enchanted forest with glowing mushrooms and ancient trees')">🌲 Forest</button>
        <button class="chip" onclick="setPrompt('A neon-lit cyberpunk city street at night, rain-soaked streets')">🌆 Cyberpunk</button>
        <button class="chip" onclick="setPrompt('An ancient stone temple overgrown with jungle vines')">🏛️ Temple</button>
        <button class="chip" onclick="setPrompt('A vast alien planet surface under twin moons and a starfield')">🚀 Space</button>
      </div>
    </div>

    <button class="btn btn-primary" id="generateBtn" onclick="generateWorld()">Generate World</button>
    <button class="btn btn-ghost" id="connectBtn" onclick="manualConnect()">Reconnect</button>

    <div class="status-row">
      <div class="status-led" id="statusLed"></div>
      <span id="statusText">Idle</span>
    </div>

    <div class="preview-box" id="previewBox">
      <div class="preview-empty" id="previewEmpty">No world generated yet this session</div>
      <img id="resultImg" alt="Generated world preview" />
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <span id="loadingText">Generating…</span>
      </div>
    </div>
  </div>

  <!-- Worlds list -->
  <div class="panel">
    <div class="worlds-head">
      <h2>Your Worlds</h2>
      <span class="count" id="worldCount">0 generated</span>
    </div>
    <div class="worlds-grid" id="worldsGrid">
      <div class="empty-state" id="emptyState">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3 16l5-6 4 5 3-4 6 8"/><circle cx="8" cy="8" r="2"/><rect x="2" y="3" width="20" height="18" rx="2"/></svg>
        <p>Nothing here yet — generate your first world to start your collection.</p>
      </div>
    </div>
  </div>
</main>

<script>
  // ====== CONFIG ======
  // Set this to your deployed Railway backend URL once deployed, e.g.:
  // const BACKEND_HTTP = "https://synthetica-backend.up.railway.app";
  const BACKEND_HTTP = window.SYNTHETICA_BACKEND || "http://localhost:8000";
  const BACKEND_WS = BACKEND_HTTP.replace("https://", "wss://").replace("http://", "ws://");

  let ws = null;
  let currentImageUrl = null;
  let worlds = []; // { prompt, image_url, ts }

  function setPrompt(text){
    document.getElementById('promptInput').value = text;
    document.getElementById('promptInput').focus();
  }

  function setStatus(state, text){
    document.getElementById('statusLed').className = 'status-led' + (state ? ' ' + state : '');
    document.getElementById('statusText').textContent = text;
  }

  function setConn(connected){
    document.getElementById('connDot').className = 'conn-dot' + (connected ? ' connected' : '');
    document.getElementById('connText').textContent = connected ? 'Connected' : 'Offline (using direct mode)';
  }

  function connectWS(){
    return new Promise((resolve, reject) => {
      try{
        ws = new WebSocket(BACKEND_WS + "/ws");
        ws.onopen = () => { setConn(true); setStatus('connected', 'Connected'); resolve(ws); };
        ws.onerror = () => reject(new Error('ws error'));
        ws.onclose = () => { setConn(false); };
      }catch(e){ reject(e); }
    });
  }

  function manualConnect(){
    setStatus('', 'Connecting…');
    connectWS().catch(() => setStatus('', 'Idle (offline mode)'));
  }

  async function generateWorld(){
    const promptInput = document.getElementById('promptInput');
    const prompt = promptInput.value.trim();
    if(!prompt){ promptInput.focus(); return; }

    const btn = document.getElementById('generateBtn');
    const overlay = document.getElementById('loadingOverlay');
    const loadingText = document.getElementById('loadingText');
    const previewEmpty = document.getElementById('previewEmpty');
    const resultImg = document.getElementById('resultImg');

    btn.disabled = true;
    btn.textContent = 'Generating…';
    overlay.classList.add('active');
    previewEmpty.style.display = 'none';

    const finish = (url) => {
      resultImg.src = url;
      resultImg.onload = () => {
        resultImg.style.display = 'block';
        overlay.classList.remove('active');
        currentImageUrl = url;
        addWorld(prompt, url);
        btn.disabled = false;
        btn.textContent = 'Generate World';
      };
    };

    try{
      if(!ws || ws.readyState !== 1){
        setStatus('generating', 'Connecting…');
        await connectWS();
      }
      setStatus('generating', 'Generating…');
      loadingText.textContent = 'Generating world…';

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if(data.status === 'generating'){
          setStatus('generating', 'Generating…');
        } else if(data.status === 'ready'){
          setStatus('ready', 'Ready');
          finish(data.image_url);
        } else if(data.status === 'error'){
          setStatus('', 'Error');
          loadingText.textContent = data.message || 'Generation failed';
          setTimeout(()=>overlay.classList.remove('active'), 1800);
          btn.disabled = false;
          btn.textContent = 'Generate World';
        }
      };
      ws.send(JSON.stringify({ prompt }));

    }catch(err){
      console.warn('WS unavailable, falling back to direct Pollinations call:', err);
      const seed = Math.floor(Math.random()*100000);
      const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', cinematic, highly detailed, digital art')}?width=768&height=576&seed=${seed}&nologo=true`;
      finish(url);
      setStatus('ready', 'Ready (direct)');
    }
  }

  function addWorld(prompt, url){
    worlds.unshift({ prompt, url, ts: Date.now() });
    renderWorlds();
  }

  function renderWorlds(){
    const grid = document.getElementById('worldsGrid');
    document.getElementById('worldCount').textContent = `${worlds.length} generated`;

    if(worlds.length === 0){
      grid.innerHTML = `<div class="empty-state" id="emptyState">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3 16l5-6 4 5 3-4 6 8"/><circle cx="8" cy="8" r="2"/><rect x="2" y="3" width="20" height="18" rx="2"/></svg>
        <p>Nothing here yet — generate your first world to start your collection.</p>
      </div>`;
      return;
    }

    grid.innerHTML = worlds.map((w, i) => `
      <div class="world-card">
        <img class="world-thumb" src="${w.url}" alt="${escapeHtml(w.prompt)}" loading="lazy" />
        <div class="world-meta">
          <div class="world-prompt">${escapeHtml(w.prompt)}</div>
          <div class="world-actions">
            <button onclick="downloadWorld(${i})">↓ Download</button>
            <button onclick="regenerateWorld(${i})">↻ Regenerate</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function downloadWorld(i){
    const w = worlds[i];
    try{
      const res = await fetch(w.url, { mode: 'cors' });
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `synthetica-world-${w.ts}.png`;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    }catch(e){
      window.open(w.url, '_blank');
    }
  }

  function regenerateWorld(i){
    document.getElementById('promptInput').value = worlds[i].prompt;
    generateWorld();
  }

  // Initial connect attempt
  manualConnect();
</script>

</body>
</html>
